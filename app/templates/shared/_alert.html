{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      {# Map Flask category ke toast type #}
      {% set toast_type = category if category in ['success','danger','warning','info'] else 'info' %}
      <div data-flash="{{ toast_type }}" data-flash-msg="{{ message }}" style="display:none;"></div>
    {% endfor %}
  {% endif %}
{% endwith %}
