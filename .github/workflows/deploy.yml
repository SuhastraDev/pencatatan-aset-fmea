name: CI/CD — Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: CI — Cek syntax & import ────────────────────────────────────
  ci:
    name: Syntax & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cek syntax semua file Python
        run: |
          echo "Mengecek syntax Python..."
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./migrations/*" \
            | xargs python -m py_compile
          echo "✅ Semua file Python lolos syntax check"

      - name: Cek import utama aplikasi
        run: |
          echo "Mengecek import aplikasi..."
          python -c "
          import sys
          sys.path.insert(0, '.')
          from app import create_app
          app = create_app()
          print('✅ create_app() berhasil dijalankan')
          "
        env:
          SECRET_KEY: ci-test-secret-key-dummy
          DATABASE_URL: sqlite:///:memory:
          FLASK_ENV: testing

  # ─── JOB 2: CD — Deploy ke Railway (hanya di push main) ─────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ke Railway
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
